# logrotate 配置 — 家教平台日志滚动
# 安装：sudo cp scripts/logrotate/roncoo-education.conf /etc/logrotate.d/roncoo-education
# 验证：sudo logrotate -d /etc/logrotate.d/roncoo-education
# 立即执行一次：sudo logrotate -f /etc/logrotate.d/roncoo-education

/home/ubuntu/logs/*.log {
    size 50M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 ubuntu ubuntu
    sharedscripts
    # copytruncate: 不给进程 SIGHUP，直接截断原文件。Java/Node 不支持日志 reopen，必须用此模式
    copytruncate
}

# ============================================================
# 家教在线平台 - 生产环境 Docker Compose
# 与 dev 的差异:
#   1. 端口只 bind 127.0.0.1, 不对公网/Docker 桥外暴露
#   2. Nacos 启用鉴权 (NACOS_AUTH_ENABLE=true)
#   3. Redis 强制密码
#   4. 密码全部从 .env 读取, 不再 fallback 到默认值
# 用法: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  mysql:
    image: mysql:8.0
    container_name: tutor-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-roncoo_education}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --lower-case-table-names=1
      - --max-connections=500
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tutor-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: tutor-nacos
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NACOS_PORT:-8848}:8848"
      - "127.0.0.1:9848:9848"
      - "127.0.0.1:9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?NACOS_AUTH_TOKEN must be set, base64-encoded 32+ chars}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?must be set}
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tutor-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set, 8+ chars}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

# 注意: 切换 compose 文件前先用以下命令确认 volume 名一致, 否则会丢数据
#   docker volume ls --format '{{.Name}}' | grep -E 'mysql_data|redis_data|nacos_data|minio_data'
# 如果实际 volume 名不是 "roncoo-education_<name>", 启动前用 -p 参数指定项目名:
#   docker compose -p roncoo-education -f docker-compose.prod.yml up -d
volumes:
  mysql_data:
  redis_data:
  nacos_data:
  minio_data:

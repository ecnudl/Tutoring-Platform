# ============================================================
# 家教在线平台 - 本地开发环境 Docker Compose
# 用法: docker compose -f docker-compose.dev.yml up -d
# ============================================================

services:

  # ---- MySQL 8 ----
  mysql:
    image: mysql:8.0
    container_name: tutor-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-RonCoo.123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-roncoo_education}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --lower-case-table-names=1
      - --max-connections=500
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-RonCoo.123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: tutor-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Nacos 2.x (服务注册 + 配置中心) ----
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: tutor-nacos
    restart: unless-stopped
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ---- MinIO (对象存储) ----
  minio:
    image: minio/minio:latest
    container_name: tutor-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  nacos_data:
  minio_data:

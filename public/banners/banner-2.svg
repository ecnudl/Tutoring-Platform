<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0F7FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" fill="url(#bg2)"/>

  <!-- 装饰圆点 -->
  <circle cx="120" cy="80" r="6" fill="#F97316" opacity="0.6"/>
  <circle cx="200" cy="140" r="4" fill="#163B6B" opacity="0.4"/>
  <circle cx="1480" cy="90" r="5" fill="#F97316" opacity="0.5"/>
  <circle cx="1530" cy="420" r="8" fill="#163B6B" opacity="0.3"/>

  <!-- 背景大字淡印 -->
  <text x="1180" y="440" font-family="'STKaiti','KaiTi','Microsoft YaHei',serif" font-size="340" font-weight="bold" fill="#163B6B" fill-opacity="0.08">师</text>

  <!-- 主标语 -->
  <text x="140" y="200" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="82" font-weight="700" fill="#163B6B" letter-spacing="6">名校教员严选</text>
  <text x="140" y="300" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="82" font-weight="700" fill="#163B6B" letter-spacing="6">学历可查可核</text>

  <line x1="140" y1="340" x2="380" y2="340" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>

  <text x="140" y="395" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#64748b" letter-spacing="3">每位教员需上传学生证/教师资格证 · 审核通过方可接单</text>

  <!-- 右侧装饰：学士帽 + 证书 -->
  <g transform="translate(1080,160)">
    <!-- 学士帽帽板 -->
    <polygon points="150,20 260,45 150,70 40,45" fill="#163B6B"/>
    <polygon points="150,20 260,45 150,70 40,45" fill="none" stroke="#0f2448" stroke-width="1"/>
    <!-- 帽顶装饰 -->
    <circle cx="150" cy="45" r="5" fill="#F97316"/>
    <!-- 流苏 -->
    <line x1="150" y1="45" x2="230" y2="100" stroke="#F97316" stroke-width="3"/>
    <circle cx="230" cy="100" r="8" fill="#F97316"/>
    <!-- 帽身 -->
    <path d="M90,55 L90,115 Q90,125 100,125 L200,125 Q210,125 210,115 L210,55" fill="#163B6B"/>

    <!-- 证书 -->
    <g transform="translate(60,160)">
      <rect x="0" y="0" width="220" height="150" rx="4" fill="#fff" stroke="#163B6B" stroke-width="2"/>
      <!-- 装饰边 -->
      <rect x="8" y="8" width="204" height="134" fill="none" stroke="#F97316" stroke-width="1.5"/>
      <!-- 标题 -->
      <text x="110" y="40" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#163B6B">认证证书</text>
      <line x1="50" y1="55" x2="170" y2="55" stroke="#cbd5e1" stroke-width="1"/>
      <!-- 内容线 -->
      <line x1="30" y1="75" x2="190" y2="75" stroke="#cbd5e1" stroke-width="1.5"/>
      <line x1="30" y1="90" x2="170" y2="90" stroke="#cbd5e1" stroke-width="1.5"/>
      <line x1="30" y1="105" x2="150" y2="105" stroke="#cbd5e1" stroke-width="1.5"/>
      <!-- 印章 -->
      <circle cx="170" cy="125" r="16" fill="none" stroke="#DC2626" stroke-width="2"/>
      <text x="170" y="130" text-anchor="middle" font-family="'STKaiti',serif" font-size="10" font-weight="700" fill="#DC2626">591</text>
    </g>
  </g>

  <!-- 品牌印章 -->
  <g transform="translate(1470,420)">
    <circle cx="30" cy="30" r="34" fill="#F97316"/>
    <text x="30" y="26" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="16" font-weight="700" fill="#fff">591</text>
    <text x="30" y="44" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="12" fill="#fff">家教网</text>
  </g>
</svg>

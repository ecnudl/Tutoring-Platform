<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF6E4"/>
      <stop offset="100%" stop-color="#FAEBD1"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" fill="url(#bg1)"/>

  <!-- 装饰：背景大字淡印 -->
  <text x="1250" y="440" font-family="'STKaiti','KaiTi','Microsoft YaHei',serif" font-size="340" font-weight="bold" fill="#F7CE88" fill-opacity="0.25">教</text>

  <!-- 主标语 -->
  <text x="140" y="200" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="82" font-weight="700" fill="#163B6B" letter-spacing="6">名师一对一</text>
  <text x="140" y="300" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="82" font-weight="700" fill="#163B6B" letter-spacing="6">上门精准辅导</text>

  <!-- 装饰横线 -->
  <line x1="140" y1="340" x2="380" y2="340" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>

  <!-- 副标语 -->
  <text x="140" y="395" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#64748b" letter-spacing="3">严选高校教员 · 零中介费 · 1v1定制方案</text>

  <!-- 右侧装饰：书本堆叠（简笔） -->
  <g transform="translate(1050,180)">
    <!-- 最底层书 -->
    <rect x="0" y="120" width="260" height="30" rx="4" fill="#F97316"/>
    <rect x="20" y="125" width="100" height="4" fill="#fff" opacity="0.7"/>
    <!-- 中层书 -->
    <rect x="20" y="90" width="220" height="30" rx="4" fill="#163B6B"/>
    <rect x="40" y="95" width="80" height="4" fill="#fff" opacity="0.7"/>
    <!-- 上层书（打开） -->
    <path d="M60,30 L200,30 Q205,30 205,35 L205,85 L60,85 Z" fill="#fff" stroke="#163B6B" stroke-width="2.5"/>
    <path d="M132,30 L132,85" stroke="#163B6B" stroke-width="2"/>
    <line x1="75" y1="48" x2="120" y2="48" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="75" y1="60" x2="120" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="75" y1="72" x2="105" y2="72" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="145" y1="48" x2="190" y2="48" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="145" y1="60" x2="190" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="145" y1="72" x2="175" y2="72" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- 铅笔 -->
    <g transform="translate(230,10) rotate(25)">
      <rect x="0" y="0" width="160" height="12" fill="#F97316"/>
      <rect x="0" y="0" width="30" height="12" fill="#DC2626"/>
      <polygon points="160,0 175,6 160,12" fill="#D4B48C"/>
      <polygon points="170,3 175,6 170,9" fill="#1e293b"/>
    </g>
  </g>

  <!-- 品牌印章（右下角） -->
  <g transform="translate(1470,420)">
    <circle cx="30" cy="30" r="34" fill="#F97316"/>
    <text x="30" y="26" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="16" font-weight="700" fill="#fff">591</text>
    <text x="30" y="44" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="12" fill="#fff">家教网</text>
  </g>
</svg>

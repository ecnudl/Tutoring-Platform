# application
spring.application.name=gateway
# profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# server
server.port=${GATEWAY_PORT:7700}
# nacos
spring.cloud.nacos.username=${NACOS_USERNAME:nacos}
spring.cloud.nacos.password=${NACOS_PASSWORD:nacos}
spring.cloud.nacos.server-addr=${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
spring.cloud.nacos.namespace=${NACOS_NAMESPACE:${spring.profiles.active}}
spring.cloud.nacos.discovery.namespace=${spring.cloud.nacos.namespace}
spring.cloud.nacos.config.namespace=${spring.cloud.nacos.namespace}
spring.config.import[0]=nacos:application.properties
spring.config.import[1]=nacos:${spring.application.name}.properties
